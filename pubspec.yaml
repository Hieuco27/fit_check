name: fit_check
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^7.6.0
  flutter_bloc: ^9.1.0
  shared_preferences: ^2.3.0
  equatable: ^2.0.7
  dio: ^5.3.3
  flutter_svg: ^2.2.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.2
  go_router: ^17.2.3
  camera: ^0.10.6
  image_picker: ^1.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.14.4"
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/home/
